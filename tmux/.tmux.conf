# terminal type + advertise truecolor (RGB) to programs running inside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# pass focus events through to programs (lets nvim re-check the system theme on focus)
set -g focus-events on

# change prefix from 'Ctrl-b' to 'Ctrl-a'
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

unbind %
bind '\' split-window -h -c "#{pane_current_path}"

unbind '"'
bind '-' split-window -v -c "#{pane_current_path}"

# reload tmux config
unbind r
bind r source-file ~/.tmux.conf

# resize tmux panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize the pane
bind -r m resize-pane -Z

# enable mouse
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# list of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'jimeh/tmux-themepack' # disabled: replaced by palette-inheriting status bar (Option A)
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

# resurrect / continuum behavior
set -g @resurrect-capture-pane-contents 'on'  # also save & restore each pane's on-screen contents
set -g @continuum-restore 'on'                # auto-restore the last session on tmux server start
set -g @continuum-save-interval '15'          # auto-save interval in minutes (15 = default)

# ── Status bar: inherits the terminal's (Ghostty) light/dark palette ──
# Uses only `default` + ANSI 0–15 colors, which Ghostty remaps per macOS
# appearance (light:gruvbox-light / dark:ayu-mirage), so the bar follows
# system light/dark automatically. No fixed colourNNN (those don't remap).
set -g status on
set -g status-interval 15
set -g status-justify absolute-centre
set -g status-style                 "bg=default,fg=default"
set -g status-left-style            "default"
set -g status-right-style           "default"

set -g status-left-length           30
set -g status-left                  "#[fg=black,bg=green,bold] #S #[fg=default,bg=default] "

set -g status-right-length          60
set -g status-right                 "#[fg=green]%H:%M#[fg=default]  #[fg=green]%d-%b#[fg=default]  #[bold]#H "

set -g window-status-separator      ""
set -g window-status-format         "#[fg=default] #I:#W#F "
set -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W#F #[fg=default,bg=default,nobold]"
set -g window-status-activity-style "fg=yellow"

set -g pane-border-style            "fg=brightblack"
set -g pane-active-border-style     "fg=green"
set -g message-style                "fg=default,bg=default,bold"
set -g mode-style                   "fg=black,bg=yellow"
set -g clock-mode-colour            "green"
# Powerline separators + centered layout. Kept in a helper so the non-ASCII
# separator glyphs (injected via printf) stay out of this file, where an
# editor/linter would otherwise strip them.
run-shell "sh $HOME/.tmux/powerline-bar.sh"

# initialize plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

